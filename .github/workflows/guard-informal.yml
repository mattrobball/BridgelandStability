name: Guard @[informal] Declarations

on:
  push:

permissions:
  contents: write
  pull-requests: write

jobs:
  check:
    name: Check paper-aligned declarations
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Get Mathlib cache
        run: lake exe cache get

      - name: Build project
        run: lake build BridgelandStability

      - name: Run #check_informal
        id: check
        run: |
          output=$(lake build checkInformal 2>&1)
          echo "$output"
          if echo "$output" | grep -q "issue(s) found"; then
            echo "has_issues=true" >> "$GITHUB_OUTPUT"
            # Extract warnings for the PR comment
            echo "$output" | grep "^.*@\[informal" > issues.txt || true
          else
            echo "has_issues=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update README table
        run: |
          python3 scripts/generate_readme_table.py
          if git diff --quiet README.md; then
            echo "README table already up to date"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "docs: update @[informal] alignment table [skip ci]"
            git push
          fi

      - name: Find associated PR
        if: steps.check.outputs.has_issues == 'true'
        id: find-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pr_number=$(gh pr list -R ${{ github.repository }} \
            --head ${{ github.ref_name }} \
            --json number --jq '.[0].number // empty' 2>/dev/null || true)
          echo "pr_number=${pr_number}" >> "$GITHUB_OUTPUT"

      - name: Post review comment on PR
        if: steps.check.outputs.has_issues == 'true' && steps.find-pr.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          body="## ⚠️ Paper-aligned declarations have drifted

          \`#check_informal\` detected changes to \`@[informal]\`-tagged declarations
          or their transitive dependencies.

          <details>
          <summary>Details</summary>

          \`\`\`
          $(cat issues.txt)
          \`\`\`

          </details>

          Add the \`paper-alignment-reviewed\` label to confirm the changes are intentional.

          🤖 *Generated by the guard-informal workflow.*"

          gh pr comment ${{ steps.find-pr.outputs.pr_number }} \
            -R ${{ github.repository }} \
            --body "$body"

      - name: Fail if issues found
        if: steps.check.outputs.has_issues == 'true'
        run: |
          # On main, warn only
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "::warning::Paper-aligned declarations have drifted. Run #check_informal locally."
            exit 0
          fi
          # On other branches, check for label
          pr_number="${{ steps.find-pr.outputs.pr_number }}"
          if [ -n "$pr_number" ]; then
            labels=$(gh pr view "$pr_number" \
              -R ${{ github.repository }} \
              --json labels --jq '.labels[].name' 2>/dev/null || true)
            if echo "$labels" | grep -q "paper-alignment-reviewed"; then
              echo "Label present — approved."
              exit 0
            fi
          fi
          echo "::error::Paper-aligned declarations have drifted. Add the 'paper-alignment-reviewed' label to the PR."
          exit 1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
