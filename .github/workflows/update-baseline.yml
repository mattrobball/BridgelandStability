name: Update Informal Baseline

on:
  pull_request:
    types: [labeled]

jobs:
  update:
    name: Update informalizations.json
    if: github.event.label.name == 'paper-alignment-reviewed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.BASELINE_PAT }}

      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Restore olean cache
        uses: actions/cache@v4
        with:
          path: .lake/build
          key: oleans-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lake-manifest.json') }}-${{ hashFiles('BridgelandStability/**/*.lean') }}
          restore-keys: |
            oleans-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lake-manifest.json') }}-

      - name: Get Mathlib cache
        run: lake exe cache get

      - name: Build and extract
        run: |
          lake build BridgelandStability
          lake build ExtractDecls

      - name: Update baseline
        run: |
          python3 scripts/merge_prose.py \
            --extracted extracted.json \
            --existing informalizations.json
          python3 -c "
          import json
          with open('informalizations.json') as f:
              data = json.load(f)
          for e in data:
              e.pop('needsReview', None)
          with open('informalizations.json', 'w') as f:
              json.dump(data, f, indent=2, ensure_ascii=False)
              f.write('\n')
          "

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add informalizations.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update informalizations.json baseline"
            git push
          fi

      - name: Remove label
        env:
          GH_TOKEN: ${{ secrets.BASELINE_PAT }}
        run: |
          gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/labels/paper-alignment-reviewed \
            --method DELETE || true
