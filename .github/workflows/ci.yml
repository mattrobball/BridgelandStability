name: CI

on:
  push:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

# ════════════════════════════════════════════════════════════════
# Job graph:
#   build-and-lint ──┬──> check-informal
#                    └──> verify-comparator
# ════════════════════════════════════════════════════════════════

jobs:
  # ── Build & Lint ─────────────────────────────────────────────
  build-and-lint:
    name: Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Restore olean cache
        uses: actions/cache@v4
        with:
          path: .lake/build
          key: oleans-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lake-manifest.json') }}-${{ hashFiles('BridgelandStability/**/*.lean') }}
          restore-keys: |
            oleans-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lake-manifest.json') }}-

      - name: Get Mathlib cache
        run: lake exe cache get

      - name: Build BridgelandStability
        run: lake build BridgelandStability

      - name: Run declaration linter
        run: lake exe runLinter

      - name: Run style linter
        run: lake exe lint-style

      - name: Upload oleans
        uses: actions/upload-artifact@v4
        with:
          name: oleans
          path: .lake/build
          retention-days: 1

  # ── Check @[informal] paper alignment ────────────────────────
  check-informal:
    name: Check paper-aligned declarations
    needs: build-and-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Download oleans
        uses: actions/download-artifact@v4
        with:
          name: oleans
          path: .lake/build

      - name: Get Mathlib cache
        run: lake exe cache get

      - name: Extract declarations
        run: lake exe extract_decls BridgelandStability extracted.json

      - name: Check informal drift
        id: check
        run: |
          output=$(python3 scripts/check_drift.py \
            --extracted extracted.json \
            --baseline informalizations.json)
          echo "$output"
          if echo "$output" | grep -q "issue(s) found"; then
            echo "has_issues=true" >> "$GITHUB_OUTPUT"
            echo "$output" | grep "^.*@\[informal" > issues.txt || true
          else
            echo "has_issues=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload extracted declarations
        uses: actions/upload-artifact@v4
        with:
          name: extracted-decls
          path: extracted.json
          retention-days: 1

      - name: Find associated PR
        if: steps.check.outputs.has_issues == 'true'
        id: find-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pr_number=$(gh pr list -R ${{ github.repository }} \
            --head ${{ github.ref_name }} \
            --json number --jq '.[0].number // empty' 2>/dev/null || true)
          echo "pr_number=${pr_number}" >> "$GITHUB_OUTPUT"

      - name: Remove stale label
        if: steps.check.outputs.has_issues == 'true' && steps.find-pr.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr edit ${{ steps.find-pr.outputs.pr_number }} \
            -R ${{ github.repository }} \
            --remove-label "paper-alignment-reviewed" 2>/dev/null || true

      - name: Post review comment on PR
        if: steps.check.outputs.has_issues == 'true' && steps.find-pr.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          body="## Paper-aligned declarations have drifted

          \`#check_informal\` detected changes to \`@[informal]\`-tagged declarations
          or their transitive dependencies.

          <details>
          <summary>Details</summary>

          \`\`\`
          $(cat issues.txt)
          \`\`\`

          </details>

          Add the \`paper-alignment-reviewed\` label to confirm the changes are intentional.

          *Generated by CI.*"

          gh pr comment ${{ steps.find-pr.outputs.pr_number }} \
            -R ${{ github.repository }} \
            --body "$body"

      - name: Fail if issues found
        if: steps.check.outputs.has_issues == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pr_number="${{ steps.find-pr.outputs.pr_number }}"
          if [ -n "$pr_number" ]; then
            labels=$(gh pr view "$pr_number" \
              -R ${{ github.repository }} \
              --json labels --jq '.labels[].name' 2>/dev/null || true)
            if echo "$labels" | grep -q "paper-alignment-reviewed"; then
              echo "Label present — baseline update workflow will handle it."
              exit 0
            fi
          fi
          echo "::error::Paper-aligned declarations have drifted. Add the 'paper-alignment-reviewed' label to update the baseline."
          exit 1

  # ── Comparator verification ──────────────────────────────────
  verify-comparator:
    name: Verify Comparator
    needs: build-and-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Download oleans
        uses: actions/download-artifact@v4
        with:
          name: oleans
          path: .lake/build

      - name: Get Mathlib cache
        run: lake exe cache get

      - name: Build project (incremental)
        run: lake build BridgelandStability

      - name: Build landrun
        run: |
          git clone --depth 1 https://github.com/Zouuup/landrun
          cd landrun && go build -o /usr/local/bin/landrun ./cmd/landrun

      - name: Build lean4export
        run: |
          LEAN_VERSION=$(sed 's|leanprover/lean4:||' lean-toolchain)
          git clone --depth 1 --branch "$LEAN_VERSION" https://github.com/leanprover/lean4export
          cd lean4export && lake build
          cp .lake/build/bin/lean4export "$HOME/.elan/bin/"

      - name: Build comparator
        run: |
          git clone --depth 1 https://github.com/leanprover/comparator
          cd comparator && lake build
          cp .lake/build/bin/comparator "$HOME/.elan/bin/"

      - name: Run comparator
        id: comparator
        continue-on-error: true
        run: lake env comparator comparator.json

      - name: Generate badge SVG
        run: |
          mkdir -p badge
          if [ "${{ steps.comparator.outcome }}" = "success" ]; then
            status="verified"; hex="#4c1"
          else
            status="failed"; hex="#e05d44"
          fi
          cat > badge/comparator.svg << SVGEOF
          <svg xmlns="http://www.w3.org/2000/svg" width="140" height="20">
            <linearGradient id="b" x2="0" y2="100%"><stop offset="0" stop-color="#bbb" stop-opacity=".1"/><stop offset="1" stop-opacity=".1"/></linearGradient>
            <clipPath id="a"><rect width="140" height="20" rx="3" fill="#fff"/></clipPath>
            <g clip-path="url(#a)"><rect width="76" height="20" fill="#555"/><rect x="76" width="64" height="20" fill="${hex}"/><rect width="140" height="20" fill="url(#b)"/></g>
            <g fill="#fff" text-anchor="middle" font-family="DejaVu Sans,Verdana,sans-serif" font-size="11">
              <text x="38" y="15" fill="#010101" fill-opacity=".3">comparator</text>
              <text x="38" y="14">comparator</text>
              <text x="107" y="15" fill="#010101" fill-opacity=".3">${status}</text>
              <text x="107" y="14">${status}</text>
            </g>
          </svg>
          SVGEOF

      - name: Upload badge
        uses: actions/upload-artifact@v4
        with:
          name: badge
          path: badge/
          retention-days: 1

      - name: Fail if comparator failed
        if: steps.comparator.outcome != 'success'
        run: exit 1
