name: Exposition

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  exposition:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v5

      - name: Checkout lean-exposition
        uses: actions/checkout@v5
        with:
          repository: mattrobball/lean-exposition
          path: lean-exposition

      - name: Build BridgelandStability and extractDeps
        uses: leanprover/lean-action@v1
        with:
          build: true
          build-args: BridgelandStability extractDeps
          use-github-cache: false

      - name: Run declaration linter
        run: lake exe runLinter

      - name: Build exposition tool
        working-directory: lean-exposition
        run: |
          lake build exposition

      - name: Generate exposition site
        run: |
          lake env ./lean-exposition/.lake/build/bin/exposition \
            --root BridgelandStability \
            --exclude-lib BridgelandSpec \
            --repo-url https://github.com/${{ github.repository }} \
            --comparator-config comparator.json \
            --tfb-exe extractDeps \
            --output exposition-out

      - name: Upload exposition preview artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: exposition-site
          path: exposition-out/html-multi
          if-no-files-found: error
          retention-days: 7

      - name: Configure Pages
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: exposition-out/html-multi

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: exposition
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
