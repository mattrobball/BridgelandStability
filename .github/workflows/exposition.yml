name: Exposition

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

env:
  LEAN_EXPOSITION_REPO: mattrobball/lean-exposition
  LEAN_EXPOSITION_REF: e8fa65d41c5e8d3dc14f183dd30b97f784116bf2

jobs:
  exposition:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v5

      - name: Build BridgelandStability and extractDeps
        uses: leanprover/lean-action@v1
        with:
          build: true
          build-args: BridgelandStability extractDeps
          use-github-cache: false

      - name: Run declaration linter
        run: lake exe runLinter

      - name: Install published exposition binary
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          artifact_name="exposition-linux-x86_64-$LEAN_EXPOSITION_REF"
          artifact_dir="/tmp/exposition-artifact"
          exposition_bin="$artifact_dir/$artifact_name/exposition"
          run_id="$(gh run list \
            -R "$LEAN_EXPOSITION_REPO" \
            --workflow "Publish Exposition Binary" \
            --event push \
            --commit "$LEAN_EXPOSITION_REF" \
            --status success \
            --json databaseId \
            --jq '.[0].databaseId')"
          test -n "$run_id"
          gh run download "$run_id" \
            -R "$LEAN_EXPOSITION_REPO" \
            -n "$artifact_name" \
            -D "$artifact_dir"
          tar -xzf \
            "$artifact_dir/$artifact_name.tar.gz" \
            -C "$artifact_dir"
          packaged_toolchain="$(tr -d '\n' < "$artifact_dir/$artifact_name/lean-toolchain")"
          expected_toolchain="$(tr -d '\n' < lean-toolchain)"
          test "$packaged_toolchain" = "$expected_toolchain"
          test -x "$exposition_bin"
          "$exposition_bin" --help >/dev/null

      - name: Generate exposition site
        run: |
          lake env /tmp/exposition-artifact/exposition-linux-x86_64-${{ env.LEAN_EXPOSITION_REF }}/exposition \
            --root BridgelandStability \
            --exclude-lib BridgelandSpec \
            --repo-url https://github.com/${{ github.repository }} \
            --comparator-config comparator.json \
            --tfb-exe extractDeps \
            --output exposition-out

      - name: Upload exposition preview artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: exposition-site
          path: exposition-out/html-multi
          if-no-files-found: error
          retention-days: 7

      - name: Configure Pages
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: exposition-out/html-multi

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: exposition
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
