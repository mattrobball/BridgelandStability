name: Label Merge Conflicts

on:
  push:
    branches: [main]
  pull_request_target:
    types: [synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  check:
    name: Check merge conflicts
    runs-on: ubuntu-latest
    steps:
      - uses: eps1lon/actions-label-merge-conflict@v3
        with:
          dirtyLabel: "merge-conflict"
          repoToken: ${{ secrets.GITHUB_TOKEN }}
