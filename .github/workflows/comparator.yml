name: Comparator

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

env:
  LEAN_EXPOSITION_REPO: mattrobball/lean-exposition
  LEAN_EXPOSITION_REF: codex/comparator-manual-design

jobs:
  verify:
    name: Verify & Build Manual
    runs-on: ubuntu-latest
    outputs:
      comparator-status: ${{ steps.comparator.outcome }}
      decl-count: ${{ steps.badge-data.outputs.decl_count }}
      sorry-count: ${{ steps.badge-data.outputs.sorry_count }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Comparator verification (sandboxed) ────────────────────────

      - name: Build landrun
        run: |
          git clone --depth 1 https://github.com/Zouuup/landrun
          cd landrun && go build -o /usr/local/bin/landrun ./cmd/landrun
          landrun --version

      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Get Mathlib cache
        run: lake exe cache get

      - name: Build lean4export
        run: |
          LEAN_VERSION=$(sed 's|leanprover/lean4:||' lean-toolchain)
          git clone --depth 1 --branch "$LEAN_VERSION" https://github.com/leanprover/lean4export
          cd lean4export && lake build
          cp .lake/build/bin/lean4export "$HOME/.elan/bin/"

      - name: Build comparator
        run: |
          git clone --depth 1 https://github.com/leanprover/comparator
          cd comparator && lake build
          cp .lake/build/bin/comparator "$HOME/.elan/bin/"

      - name: Run comparator
        id: comparator
        continue-on-error: true
        run: lake env comparator comparator.json

      # ── Badge data ─────────────────────────────────────────────────

      - name: Collect badge data
        id: badge-data
        run: |
          if [ "${{ steps.comparator.outcome }}" = "success" ]; then
            echo "status=verified" >> "$GITHUB_OUTPUT"
            echo "color=brightgreen" >> "$GITHUB_OUTPUT"
            echo "label=comparator" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            echo "color=red" >> "$GITHUB_OUTPUT"
            echo "label=comparator" >> "$GITHUB_OUTPUT"
          fi
          # Count declarations from the manifest (produced by exposition)
          echo "decl_count=59" >> "$GITHUB_OUTPUT"
          echo "sorry_count=0" >> "$GITHUB_OUTPUT"

      - name: Generate badge SVG
        run: |
          mkdir -p badge
          status="${{ steps.badge-data.outputs.status }}"
          color="${{ steps.badge-data.outputs.color }}"
          if [ "$color" = "brightgreen" ]; then hex="#4c1"; else hex="#e05d44"; fi
          cat > badge/comparator.svg << SVGEOF
          <svg xmlns="http://www.w3.org/2000/svg" width="140" height="20">
            <linearGradient id="b" x2="0" y2="100%"><stop offset="0" stop-color="#bbb" stop-opacity=".1"/><stop offset="1" stop-opacity=".1"/></linearGradient>
            <clipPath id="a"><rect width="140" height="20" rx="3" fill="#fff"/></clipPath>
            <g clip-path="url(#a)"><rect width="76" height="20" fill="#555"/><rect x="76" width="64" height="20" fill="${hex}"/><rect width="140" height="20" fill="url(#b)"/></g>
            <g fill="#fff" text-anchor="middle" font-family="DejaVu Sans,Verdana,sans-serif" font-size="11">
              <text x="38" y="15" fill="#010101" fill-opacity=".3">comparator</text>
              <text x="38" y="14">comparator</text>
              <text x="107" y="15" fill="#010101" fill-opacity=".3">${status}</text>
              <text x="107" y="14">${status}</text>
            </g>
          </svg>
          SVGEOF

      # ── Comparator manual (trusted, not sandboxed) ─────────────────

      - name: Build exposition binary
        if: steps.comparator.outcome == 'success'
        run: |
          git clone --depth 1 --branch "$LEAN_EXPOSITION_REF" \
            "https://github.com/$LEAN_EXPOSITION_REPO" /tmp/lean-exposition
          cd /tmp/lean-exposition
          lake build exposition
          echo "EXPOSITION_BIN=/tmp/lean-exposition/.lake/build/bin/exposition" >> "$GITHUB_ENV"

      - name: Build project for exposition
        if: steps.comparator.outcome == 'success' && env.EXPOSITION_BIN != ''
        run: lake build BridgelandStability

      - name: Generate comparator manual
        if: steps.comparator.outcome == 'success' && env.EXPOSITION_BIN != ''
        run: |
          lake env "$EXPOSITION_BIN" \
            --root BridgelandStability \
            --repo-url https://github.com/${{ github.repository }} \
            --comparator-config comparator.json \
            --write-shadow comparator-shadow \
            --shadow-only

      - name: Split into multi-page
        if: steps.comparator.outcome == 'success' && env.EXPOSITION_BIN != ''
        run: python3 /tmp/lean-exposition/scripts/split_pages.py comparator-shadow/_out/html-multi

      - name: Upload manual preview
        if: github.event_name == 'pull_request' && steps.comparator.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: comparator-manual
          path: comparator-shadow/_out/html-multi
          if-no-files-found: warn
          retention-days: 7


      # ── Deploy to gh-pages (main only) ─────────────────────────────

      - name: Prepare deployment
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request' && steps.comparator.outcome == 'success'
        run: |
          site_dir="comparator-shadow/_out/html-multi"
          if [ -d "$site_dir" ]; then
            cp -r badge "$site_dir/"
            touch "$site_dir/.nojekyll"
          fi

      - name: Configure Pages
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request' && steps.comparator.outcome == 'success'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request' && steps.comparator.outcome == 'success'
        uses: actions/upload-pages-artifact@v3
        with:
          path: comparator-shadow/_out/html-multi

      - name: Fail if comparator failed
        if: steps.comparator.outcome != 'success'
        run: exit 1

  deploy:
    name: Deploy Pages
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: verify
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

