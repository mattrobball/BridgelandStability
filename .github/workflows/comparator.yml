name: Comparator

on:
  workflow_run:
    workflows: ["Build & Lint"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

env:
  LEAN_EXPOSITION_REPO: mattrobball/lean-exposition
  LEAN_EXPOSITION_REF: codex/comparator-manual-design

# ════════════════════════════════════════════════════════════════
# Job graph (oleans from Build & Lint):
#   verify ──────────┬──> deploy
#   generate-manual ──┤
#   build-site ───────┘
# ════════════════════════════════════════════════════════════════

jobs:
  # ── Comparator verification ────────────────────────────────────
  verify:
    name: Verify Comparator
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      comparator-status: ${{ steps.comparator.outcome }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Download oleans
        if: github.event_name != 'workflow_dispatch'
        uses: actions/download-artifact@v4
        with:
          name: oleans
          path: .lake/build
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Mathlib cache
        run: lake exe cache get

      - name: Build project (incremental)
        run: lake build BridgelandStability

      - name: Build landrun
        run: |
          git clone --depth 1 https://github.com/Zouuup/landrun
          cd landrun && go build -o /usr/local/bin/landrun ./cmd/landrun

      - name: Build lean4export
        run: |
          LEAN_VERSION=$(sed 's|leanprover/lean4:||' lean-toolchain)
          git clone --depth 1 --branch "$LEAN_VERSION" https://github.com/leanprover/lean4export
          cd lean4export && lake build
          cp .lake/build/bin/lean4export "$HOME/.elan/bin/"

      - name: Build comparator
        run: |
          git clone --depth 1 https://github.com/leanprover/comparator
          cd comparator && lake build
          cp .lake/build/bin/comparator "$HOME/.elan/bin/"

      - name: Run comparator
        id: comparator
        continue-on-error: true
        run: lake env comparator comparator.json

      - name: Generate badge SVG
        run: |
          mkdir -p badge
          if [ "${{ steps.comparator.outcome }}" = "success" ]; then
            status="verified"; hex="#4c1"
          else
            status="failed"; hex="#e05d44"
          fi
          cat > badge/comparator.svg << SVGEOF
          <svg xmlns="http://www.w3.org/2000/svg" width="140" height="20">
            <linearGradient id="b" x2="0" y2="100%"><stop offset="0" stop-color="#bbb" stop-opacity=".1"/><stop offset="1" stop-opacity=".1"/></linearGradient>
            <clipPath id="a"><rect width="140" height="20" rx="3" fill="#fff"/></clipPath>
            <g clip-path="url(#a)"><rect width="76" height="20" fill="#555"/><rect x="76" width="64" height="20" fill="${hex}"/><rect width="140" height="20" fill="url(#b)"/></g>
            <g fill="#fff" text-anchor="middle" font-family="DejaVu Sans,Verdana,sans-serif" font-size="11">
              <text x="38" y="15" fill="#010101" fill-opacity=".3">comparator</text>
              <text x="38" y="14">comparator</text>
              <text x="107" y="15" fill="#010101" fill-opacity=".3">${status}</text>
              <text x="107" y="14">${status}</text>
            </g>
          </svg>
          SVGEOF

      - name: Upload badge
        uses: actions/upload-artifact@v4
        with:
          name: badge
          path: badge/
          retention-days: 1

      - name: Fail if comparator failed
        if: steps.comparator.outcome != 'success'
        run: exit 1

  # ── Generate comparator manual (Verso shadow build) ────────────
  generate-manual:
    name: Generate Manual
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Download oleans
        if: github.event_name != 'workflow_dispatch'
        uses: actions/download-artifact@v4
        with:
          name: oleans
          path: .lake/build
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Mathlib cache
        run: lake exe cache get

      - name: Build project (incremental)
        run: lake build BridgelandStability

      # ── Exposition binary (cached) ──

      - name: Clone lean-exposition
        run: |
          git clone --depth 1 --branch "$LEAN_EXPOSITION_REF" \
            "https://github.com/$LEAN_EXPOSITION_REPO" /tmp/lean-exposition

      - name: Restore exposition cache
        uses: actions/cache@v4
        with:
          path: /tmp/lean-exposition/.lake
          key: exposition-${{ hashFiles('lean-toolchain') }}-${{ env.LEAN_EXPOSITION_REF }}

      - name: Build exposition binary
        run: |
          cd /tmp/lean-exposition && lake build exposition
          echo "EXPOSITION_BIN=/tmp/lean-exposition/.lake/build/bin/exposition" >> "$GITHUB_ENV"

      # ── Shadow build (cached Verso/SubVerso) ──

      - name: Restore shadow cache
        uses: actions/cache@v4
        with:
          path: |
            comparator-shadow/.lake/packages/verso
            comparator-shadow/.lake/packages/subverso
            comparator-shadow/.lake/packages/MD4Lean
            comparator-shadow/.lake/packages/plausible
          key: shadow-verso-${{ hashFiles('lean-toolchain') }}
          restore-keys: |
            shadow-verso-

      - name: Generate comparator manual
        run: |
          lake env "$EXPOSITION_BIN" \
            --root BridgelandStability \
            --repo-url "https://github.com/${{ github.repository }}" \
            --comparator-config comparator.json \
            --write-shadow comparator-shadow \
            --shadow-only

      - name: Upload manual
        uses: actions/upload-artifact@v4
        with:
          name: comparator-manual
          path: comparator-shadow/_out/html-multi
          if-no-files-found: warn
          retention-days: 7

  # ── Build informal exposition site ─────────────────────────────
  build-site:
    name: Build Informal Site
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Download oleans
        if: github.event_name != 'workflow_dispatch'
        uses: actions/download-artifact@v4
        with:
          name: oleans
          path: .lake/build
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Mathlib cache
        run: lake exe cache get

      - name: Build project (incremental)
        run: lake build BridgelandStability

      - name: Generate Verso docs
        run: |
          python3 scripts/generate_site.py \
            --json informalizations.json \
            --output site-build \
            --source-path "$(pwd)" \
            --prefix BridgelandStability \
            --verso-rev v4.29.0 \
            --repo-url "https://github.com/${{ github.repository }}"

      - name: Restore site cache
        uses: actions/cache@v4
        with:
          path: |
            site-build/.lake
            site-build/lake-manifest.json
          key: site-lake-${{ hashFiles('lean-toolchain') }}-v4.29.0-${{ hashFiles('informalizations.json') }}
          restore-keys: |
            site-lake-${{ hashFiles('lean-toolchain') }}-v4.29.0-

      - name: Build Verso site
        run: |
          cd site-build
          if [ ! -f lake-manifest.json ]; then
            lake update
          fi
          lake exe cache get || true
          lake build informal
          lake exe informal

      - name: Style site
        run: |
          pip install beautifulsoup4
          python3 scripts/style_site.py site-build/_out/html-multi --json informalizations.json

      - name: Upload site
        uses: actions/upload-artifact@v4
        with:
          name: informal-site
          path: site-build/_out/html-multi
          if-no-files-found: warn
          retention-days: 7

  # ── Deploy to GitHub Pages ─────────────────────────────────────
  deploy:
    name: Deploy Pages
    if: github.event.workflow_run.head_branch == 'main'
    needs: [verify, generate-manual, build-site]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download informal site
        uses: actions/download-artifact@v4
        with:
          name: informal-site
          path: site

      - name: Download comparator manual
        uses: actions/download-artifact@v4
        with:
          name: comparator-manual
          path: site/comparator
        continue-on-error: true

      - name: Download badge
        uses: actions/download-artifact@v4
        with:
          name: badge
          path: site/badge

      - name: Prepare deployment
        run: touch site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
