name = "BridgelandStability"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["BridgelandStability"]

[leanOptions]
autoImplicit = false

[[require]]
name = "checkdecls"
git = "https://github.com/PatrickMassot/checkdecls"
rev = "master"

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "master"

[[lean_lib]]
name = "BridgelandStability"
srcDir = "."

[[lean_lib]]
name = "BridgelandSpec"
srcDir = "."

[[lean_exe]]
name = "checkdecls"
root = "Checkdecls"
supportInterpreter = true

[[lean_exe]]
name = "extractDeps"
root = "ExtractDeps"
supportInterpreter = true
