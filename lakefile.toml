name = "BridgelandStability"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["BridgelandStability"]

[leanOptions]
autoImplicit = false

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.29.0"

[[require]]
name = "informal"
git = "https://github.com/mattrobball/lean-informal"
rev = "b04051540b6ed5cbca82fd8e29a3088574fe76e4"

[[lean_lib]]
name = "BridgelandStability"
srcDir = "."

[[lean_lib]]
name = "CheckInformal"
srcDir = "scripts/lean"

[[lean_lib]]
name = "ExtractDecls"
srcDir = "scripts/lean"

[[lean_lib]]
name = "EmitTFB"
srcDir = "scripts/lean"
