name = "BridgelandStability"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["BridgelandStability"]

[leanOptions]
autoImplicit = false

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.29.0"

[[require]]
name = "informal"
git = "https://github.com/mattrobball/lean-informal"
rev = "f274508afe725111cc7f47663659b8aee5ed7744"

[[lean_lib]]
name = "BridgelandStability"
srcDir = "."

[[lean_lib]]
name = "CheckInformal"
srcDir = "scripts/lean"

[[lean_lib]]
name = "ExtractDecls"
srcDir = "scripts/lean"

[[lean_lib]]
name = "EmitTFB"
srcDir = "scripts/lean"
